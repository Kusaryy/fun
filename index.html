<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zufallsbilder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: sans-serif;
      gap: 30px;
    }
    button {
      padding: 16px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #e94560, #0f3460);
      color: #fff;
      box-shadow: 0 4px 20px rgba(233,69,96,0.4);
      transition: transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    button:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(233,69,96,0.6); }
    button:active { transform: scale(0.97); }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 1000px;
    }
    .img-card {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      animation: popIn 0.3s ease;
    }
    .img-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #counter {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <button onclick="addImages()">💦 Mehr Bilder!</button>
  <div id="counter">0 Bilder geladen</div>
  <div id="gallery"></div>

  <script>
    let count = 0;

    function addImages() {
      const gallery = document.getElementById('gallery');
      const batch = 6;

      for (let i = 0; i < batch; i++) {
        const seed = Math.floor(Math.random() * 1000);
        const card = document.createElement('div');
        card.className = 'img-card';

        const img = document.createElement('img');
        img.src = `https://picsum.photos/seed/${seed}/400/300`;
        img.alt = 'Zufallsbild';
        img.loading = 'lazy';

        card.appendChild(img);
        gallery.prepend(card);
        count++;
      }

      document.getElementById('counter').textContent = `${count} Bilder geladen`;
    }
  </script>
</body>
</html>
